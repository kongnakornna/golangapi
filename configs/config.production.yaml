app:
  server:
    port: ${PORT:8080}          # ใช้ตัวแปรสภาพแวดล้อม ค่าเริ่มต้น 8080
    timeout: 30s
    read_timeout: 15s
    write_timeout: 15s

  database:
    driver: postgres
    host: ${DB_HOST}            # อ่านจากตัวแปรสภาพแวดล้อม
    port: ${DB_PORT:5432}       
    username: ${DB_USER}
    password: ${DB_PASSWORD}   # ข้อมูลสำคัญต้องอ่านจากตัวแปรสภาพแวดล้อม
    dbname: ${DB_NAME}
    sslmode: ${DB_SSL_MODE:require}   # สภาพแวดล้อมการใช้งานจริงแนะนำให้เปิดใช้ SSL
    max_open_conns: 100        # สภาพแวดล้อมการใช้งานจริงเพิ่มขนาดพูลการเชื่อมต่อ
    max_idle_conns: 25
    conn_max_lifetime: 30m     # ลดอายุการเชื่อมต่อ หลีกเลี่ยงปัญหาการเชื่อมต่อนานเกินไป

  redis:
    enabled: ${REDIS_ENABLED:true}
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD} 
    db: ${REDIS_DB:0}

  log:
    level: ${LOG_LEVEL:info}   # สภาพแวดล้อมการใช้งานจริง ค่าเริ่มต้นระดับ info
    file: ${LOG_FILE:logs/app.log}
    console: ${LOG_CONSOLE:false}  # สภาพแวดล้อมการใช้งานจริง ปิดการแสดงผลทางคอนโซล

  jwt:
    secret: ${JWT_SECRET}        # ต้องอ่านจากตัวแปรสภาพแวดล้อม

 refresh_token_exp: ${JWT_REFRESH_EXP}
    issuer: ${JWT_ISSUER:go-rest-starter}
