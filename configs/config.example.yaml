app:
  server:
    port: 7001           # หมายเลขพอร์ตบริการ
    timeout: 30s         # การตั้งค่าระยะเวลาหมดเวลาทั่วโลก
    read_timeout: 15s    # ระยะเวลาหมดเวลาการอ่าน
    write_timeout: 15s   # ระยะเวลาหมดเวลาการเขียน

  database:
    driver: postgres      # ชนิดฐานข้อมูล
    host: localhost       # ที่อยู่โฮสต์ฐานข้อมูล
    port: 5432            # พอร์ตฐานข้อมูล
    username: postgres    # ชื่อผู้ใช้ฐานข้อมูล
    password: postgres    # "****"      # รหัสผ่านฐานข้อมูล - ในสภาพแวดล้อมการผลิตแนะนำให้ใช้ตัวแปรสภาพแวดล้อม: ${DB_PASSWORD}
    dbname: iodb         # ชื่อฐานข้อมูล
    sslmode: disable      # โหมด SSL
    max_open_conns: 20    # จำนวนการเชื่อมต่อสูงสุด
    max_idle_conns: 5     # จำนวนการเชื่อมต่อว่างสูงสุด
    conn_max_lifetime: 1h # อายุการใช้งานสูงสุดของการเชื่อมต่อ

  redis:
    enabled: true         # เปิดใช้ Redis หรือไม่ (ถ้าเป็น false จะลดระดับเป็น Noop โดยอัตโนมัติ)
    host: localhost       # ที่อยู่โฮสต์ Redis
    port: 6379            # พอร์ต Redis
    password: ""          # รหัสผ่าน Redis - หากต้องการรหัสผ่าน กรุณาใช้ตัวแปรสภาพแวดล้อม: ${REDIS_PASSWORD}
    db: 0                 # ดัชนีฐานข้อมูล Redis

  log:
    level: debug          # ระดับบันทึก: debug, info, warn, error
    file: "logs/app.log"  # เส้นทางไฟล์บันทึก
    console: true         # ส่งออกไปยังคอนโซลพร้อมกันหรือไม่

  jwt:
    secret: "Na@golang" # คีย์ JWT - ในสภาพแวดล้อมการผลิตต้องแก้ไขและใช้ตัวแปรสภาพแวดล้อม: ${JWT_SECRET}
    access_token_exp: 24h                 # เวลาหมดอายุของโทเค็นการเข้าถึง
    refresh_token_exp: 168h               # เวลาหมดอายุของโทเค็นรีเฟรช
    issuer: "go-rest-starter"             # ผู้ออกโทเค็น