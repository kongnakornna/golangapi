  #     timeout: 5s
  #     retries: 5

  app:
    build:
      context: ../.. # project root (contains go.mod)
      dockerfile: deploy/docker/Dockerfile # path from context
    ports:
      - "8080:8080"
    environment:
      CONFIG_PATH: configs/config.yaml
      DB_HOST: postgres
      DB_PORT: 5432 # internal PostgreSQL port
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: iodb
      DB_SSL_MODE: disable
      REDIS_HOST: localhost
      REDIS_PORT: 6379 # internal Redis port
      JWT_SECRET: go@12@#!
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/root/logs

volumes:
  postgres_data:
  redis_data:
